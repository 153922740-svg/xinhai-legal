<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日签到 - 心海法律 AI</title>
    <style>
        :root{--bg-primary:#0a0e1a;--bg-secondary:#131825;--bg-card:#1a1f2e;--border:#1e2538;--text-primary:#e8eaed;--text-secondary:#94a3b8;--accent-primary:#6366f1;--accent-secondary:#8b5cf6;--success:#22c55e}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding:20px}
        .container{max-width:500px;margin:0 auto}
        .header{text-align:center;margin-bottom:30px}
        .header h1{font-size:24px;margin-bottom:8px}
        .header p{color:var(--text-secondary)}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
        .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:20px}
        .stat{background:var(--bg-secondary);border-radius:12px;padding:20px;text-align:center}
        .stat .value{font-size:28px;font-weight:600;color:var(--accent-primary)}
        .stat .label{font-size:14px;color:var(--text-secondary);margin-top:4px}
        .sign-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border:none;border-radius:12px;font-size:18px;font-weight:500;cursor:pointer;margin-bottom:20px}
        .sign-btn:disabled{opacity:0.5;cursor:not-allowed}
        .sign-btn.signed{background:var(--success)}
        .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:20px}
        .calendar .day{text-align:center;padding:12px 8px;background:var(--bg-secondary);border-radius:8px;font-size:14px}
        .calendar .day .date{font-size:16px;font-weight:500;margin-bottom:4px}
        .calendar .day .dots{display:flex;justify-content:center;gap:3px}
        .calendar .day .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-primary)}
        .calendar .day.signed{border:2px solid var(--success)}
        .calendar .day.today{border:2px solid var(--accent-primary)}
        .calendar .weekday{color:var(--text-secondary);font-size:12px;padding:8px}
        .makeup-section{margin-top:20px}
        .makeup-section h3{font-size:16px;margin-bottom:15px}
        .makeup-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg-secondary);border-radius:8px;margin-bottom:10px}
        .makeup-item .info{display:flex;align-items:center;gap:10px}
        .makeup-item .cost{color:var(--accent-primary);font-weight:500}
        .makeup-btn{padding:6px 12px;background:var(--accent-primary);border:none;border-radius:6px;color:white;font-size:12px;cursor:pointer}
        .rules{margin-top:20px;font-size:13px;color:var(--text-secondary);line-height:1.8}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:1000;display:none}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <h1>📅 每日签到</h1>
            <p>连续签到领积分奖励</p>
        </div>
        
        <div class="card">
            <div class="stats">
                <div class="stat">
                    <div class="value" id="continuousDays">0</div>
                    <div class="label">连续签到</div>
                </div>
                <div class="stat">
                    <div class="value" id="totalPoints">0</div>
                    <div class="label">当前积分</div>
                </div>
            </div>
            <button class="sign-btn" id="signBtn" onclick="doSign()">立即签到</button>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom:15px">本月签到</h3>
            <div class="calendar" id="calendar">
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>
                <div class="weekday">日</div>
            </div>
        </div>
        
        <div class="card makeup-section" id="makeupSection" style="display:none">
            <h3>💫 补签</h3>
            <div id="makeupList"></div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom:15px">📋 签到规则</h3>
            <div class="rules">
                • 每日签到基础奖励：10 积分<br>
                • 连续签到 3 天：额外奖励 20 积分<br>
                • 连续签到 7 天：额外奖励 50 积分<br>
                • 连续签到 14 天：额外奖励 120 积分<br>
                • 连续签到 30 天：额外奖励 300 积分<br>
                • 可补签最近 3 天，消耗积分<br>
                • 补签价格：1 天前 20 分，2 天前 30 分，3 天前 50 分
            </div>
        </div>
    </div>
    
    <script>
        const userId = localStorage.getItem('user_id');
        let todaySigned = false;
        
        window.onload = function() {
            if (!userId) {
                window.location.href = '/login.html';
                return;
            }
            loadSignStatus();
            loadBalance();
        };
        
        async function loadSignStatus() {
            try {
                const r = await fetch(`/api/v1/user/sign/status?user_id=${userId}`);
                const d = await r.json();
                
                if (d.code === 200) {
                    todaySigned = d.data.today_signed;
                    document.getElementById('continuousDays').textContent = d.data.continuous_days;
                    
                    const btn = document.getElementById('signBtn');
                    if (todaySigned) {
                        btn.disabled = true;
                        btn.textContent = '今日已签到 ✓';
                        btn.classList.add('signed');
                    }
                    
                    renderCalendar(d.data.month_records);
                    renderMakeupList(d.data.month_records);
                }
            } catch(e) {
                console.error(e);
            }
        }
        
        async function loadBalance() {
            try {
                const r = await fetch(`/api/v1/integral/balance?user_id=${userId}`);
                const d = await r.json();
                
                if (d.code === 200) {
                    document.getElementById('totalPoints').textContent = d.data.balance;
                }
            } catch(e) {
                console.error(e);
            }
        }
        
        function renderCalendar(records) {
            const calendar = document.getElementById('calendar');
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            
            // 已签到日期集合
            const signedDates = new Set(records.map(r => r.date));
            
            // 添加空白（上月）
            for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
                calendar.innerHTML += '<div></div>';
            }
            
            // 添加日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = day === today.getDate();
                const isSigned = signedDates.has(dateStr);
                
                calendar.innerHTML += `
                    <div class="day ${isToday ? 'today' : ''} ${isSigned ? 'signed' : ''}">
                        <div class="date">${day}</div>
                        ${isSigned ? '<div class="dots"><div class="dot"></div></div>' : ''}
                    </div>
                `;
            }
        }
        
        function renderMakeupList(records) {
            const signedDates = new Set(records.map(r => r.date));
            const today = new Date();
            const makeupList = document.getElementById('makeupList');
            let hasMakeup = false;
            
            const makeupCosts = {1: 20, 2: 30, 3: 50};
            
            for (let daysAgo = 1; daysAgo <= 3; daysAgo++) {
                const date = new Date(today);
                date.setDate(date.getDate() - daysAgo);
                const dateStr = date.toISOString().split('T')[0];
                
                if (!signedDates.has(dateStr)) {
                    hasMakeup = true;
                    makeupList.innerHTML += `
                        <div class="makeup-item">
                            <div class="info">
                                <span>${daysAgo}天前 (${dateStr})</span>
                            </div>
                            <div>
                                <span class="cost">${makeupCosts[daysAgo]}分</span>
                                <button class="makeup-btn" onclick="doMakeup('${dateStr}', ${makeupCosts[daysAgo]})">补签</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (hasMakeup) {
                document.getElementById('makeupSection').style.display = 'block';
            }
        }
        
        async function doSign() {
            const btn = document.getElementById('signBtn');
            btn.disabled = true;
            btn.textContent = '签到中...';
            
            try {
                const r = await fetch('/api/v1/user/sign', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId})
                });
                const d = await r.json();
                
                if (d.code === 200) {
                    showToast(`签到成功！获得${d.data.total}积分`);
                    btn.textContent = '今日已签到 ✓';
                    btn.classList.add('signed');
                    loadSignStatus();
                    loadBalance();
                } else {
                    showToast(d.message);
                    btn.disabled = false;
                }
            } catch(e) {
                showToast('签到失败，请稍后重试');
                btn.disabled = false;
            }
        }
        
        async function doMakeup(date, cost) {
            if (!confirm(`确认消耗${cost}积分补签 ${date}？`)) return;
            
            try {
                const r = await fetch('/api/v1/user/sign/makeup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, date: date})
                });
                const d = await r.json();
                
                if (d.code === 200) {
                    showToast('补签成功！');
                    loadSignStatus();
                    loadBalance();
                } else {
                    showToast(d.message);
                }
            } catch(e) {
                showToast('补签失败，请稍后重试');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
