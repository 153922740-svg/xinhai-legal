<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 心海法律 AI</title>
    <style>
        :root{--bg-primary:#0a0e1a;--bg-secondary:#131825;--bg-card:#1a1f2e;--border:#1e2538;--text-primary:#e8eaed;--text-secondary:#94a3b8;--accent-primary:#6366f1;--accent-secondary:#8b5cf6;--success:#22c55e}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{margin-bottom:30px}
        .header h1{font-size:24px}
        .tabs{display:flex;gap:10px;margin-bottom:20px}
        .tab{flex:1;text-align:center;padding:12px;background:var(--bg-secondary);border-radius:8px;cursor:pointer;font-size:14px}
        .tab.active{background:var(--accent-primary);color:white}
        .order-list{display:flex;flex-direction:column;gap:15px}
        .order-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
        .order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:15px;border-bottom:1px solid var(--border)}
        .order-no{font-size:14px;color:var(--text-secondary)}
        .order-status{padding:4px 12px;border-radius:20px;font-size:12px}
        .status-paid{background:var(--success);color:white}
        .status-pending{background:var(--warning);color:black}
        .status-cancelled{background:#ef4444;color:white}
        .order-body{display:flex;justify-content:space-between;margin-bottom:15px}
        .order-info .name{font-size:15px;font-weight:500;margin-bottom:4px}
        .order-info .desc{font-size:12px;color:var(--text-secondary)}
        .order-amount{text-align:right}
        .order-amount .value{font-size:18px;font-weight:600;color:var(--accent-primary)}
        .order-amount .time{font-size:12px;color:var(--text-secondary);margin-top:4px}
        .order-actions{display:flex;gap:10px;justify-content:flex-end}
        .action-btn{padding:8px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer}
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-secondary)}
        .empty .icon{font-size:60px;margin-bottom:20px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:1000;display:none}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <h1>📦 我的订单</h1>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('all')">全部</div>
            <div class="tab" onclick="switchTab('member')">会员订单</div>
            <div class="tab" onclick="switchTab('token')">Token 订单</div>
        </div>
        
        <div class="order-list" id="orderList"></div>
    </div>
    
    <script>
        const userId = localStorage.getItem('user_id');
        let currentTab = 'all';
        
        window.onload = function() {
            if (!userId) {
                window.location.href = '/login.html';
                return;
            }
            loadOrders();
        };
        
        async function loadOrders() {
            try {
                // 模拟订单数据（实际应调用 API）
                const orders = [
                    {
                        order_no: 'MEM202605170001',
                        type: 'member',
                        name: '会员套餐 - 季卡',
                        desc: '90 天会员权限',
                        amount: 80,
                        status: 'paid',
                        created_at: '2026-05-17T10:30:00'
                    },
                    {
                        order_no: 'TKN202605160002',
                        type: 'token',
                        name: 'Token 充值',
                        desc: '50,000 Token',
                        amount: 10,
                        status: 'paid',
                        created_at: '2026-05-16T15:20:00'
                    },
                    {
                        order_no: 'MEM202605150003',
                        type: 'member',
                        name: '会员套餐 - 月卡',
                        desc: '30 天会员权限',
                        amount: 30,
                        status: 'paid',
                        created_at: '2026-05-15T09:00:00'
                    }
                ];
                
                const list = document.getElementById('orderList');
                
                let filtered = orders;
                if (currentTab !== 'all') {
                    filtered = orders.filter(o => o.type === currentTab);
                }
                
                if (filtered.length === 0) {
                    list.innerHTML = `
                        <div class="empty">
                            <div class="icon">📦</div>
                            <div>暂无订单</div>
                            <button class="action-btn" onclick="window.location.href='/member.html'" style="margin-top:20px">开通会员</button>
                        </div>
                    `;
                    return;
                }
                
                list.innerHTML = filtered.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-no">${order.order_no}</span>
                            <span class="order-status status-${order.status}">${getStatusText(order.status)}</span>
                        </div>
                        <div class="order-body">
                            <div class="order-info">
                                <div class="name">${order.name}</div>
                                <div class="desc">${order.desc}</div>
                            </div>
                            <div class="order-amount">
                                <div class="value">¥${order.amount}</div>
                                <div class="time">${new Date(order.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="order-actions">
                            ${order.status === 'paid' ? `
                                <button class="action-btn" onclick="showDetail('${order.order_no}')">查看详情</button>
                                <button class="action-btn" onclick="downloadInvoice('${order.order_no}')">下载发票</button>
                            ` : ''}
                            ${order.status === 'pending' ? `
                                <button class="action-btn" onclick="pay('${order.order_no}')">立即支付</button>
                                <button class="action-btn" onclick="cancel('${order.order_no}')" style="color:#ef4444">取消订单</button>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
                
            } catch(e) {
                console.error(e);
            }
        }
        
        function getStatusText(status) {
            const texts = {paid: '已支付', pending: '待支付', cancelled: '已取消'};
            return texts[status] || status;
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadOrders();
        }
        
        function showDetail(orderNo) {
            showToast('订单详情功能开发中...');
        }
        
        function downloadInvoice(orderNo) {
            showToast('发票下载功能开发中...');
        }
        
        function pay(orderNo) {
            showToast('支付功能开发中...');
        }
        
        function cancel(orderNo) {
            if (confirm('确定取消该订单吗？')) {
                showToast('订单已取消');
                loadOrders();
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
