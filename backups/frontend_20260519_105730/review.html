<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件评估 - 心海法律 AI</title>
    <style>
        :root{--bg-primary:#0a0e1a;--bg-secondary:#131825;--bg-card:#1a1f2e;--border:#1e2538;--text-primary:#e8eaed;--text-secondary:#94a3b8;--accent-primary:#6366f1;--accent-secondary:#8b5cf6;--success:#22c55e;--warning:#f59e0b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{margin-bottom:30px}
        .header h1{font-size:24px;margin-bottom:10px}
        .header p{color:var(--text-secondary)}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:25px;margin-bottom:20px}
        .card h2{font-size:18px;margin-bottom:20px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:14px;color:var(--text-secondary);margin-bottom:8px}
        select,textarea,input{width:100%;padding:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-size:15px}
        select:focus,textarea:focus,input:focus{outline:none;border-color:var(--accent-primary)}
        textarea{min-height:120px;resize:vertical;line-height:1.6}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .result-card{display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:25px;margin-top:20px}
        .result-card.show{display:block}
        .score{display:flex;align-items:center;justify-content:center;margin-bottom:20px}
        .score-circle{width:120px;height:120px;border-radius:50%;border:8px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center}
        .score-circle.good{border-color:var(--success)}
        .score-circle.medium{border-color:var(--warning)}
        .score-circle.low{border-color:#ef4444}
        .score-circle .value{font-size:32px;font-weight:600}
        .score-circle .label{font-size:12px;color:var(--text-secondary)}
        .result-section{margin-bottom:20px}
        .result-section h3{font-size:16px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
        .result-section p{font-size:14px;line-height:1.8;color:var(--text-secondary)}
        .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;margin-right:8px;margin-bottom:8px}
        .tag-good{background:rgba(34,197,94,0.2);color:var(--success)}
        .tag-medium{background:rgba(245,158,11,0.2);color:var(--warning)}
        .tag-low{background:rgba(239,68,68,0.2);color:#ef4444}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:1000;display:none}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <h1>⚖️ 案件评估</h1>
            <p>AI 智能评估案件胜诉概率</p>
        </div>
        
        <div class="card">
            <h2>案件信息</h2>
            <div class="form-group">
                <label>案件类型 *</label>
                <select id="caseType">
                    <option value="">请选择案件类型</option>
                    <option value="labor">劳动纠纷</option>
                    <option value="contract">合同纠纷</option>
                    <option value="marriage">婚姻家事</option>
                    <option value="debt">债权债务</option>
                    <option value="traffic">交通事故</option>
                    <option value="property">房产纠纷</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>案情描述 *</label>
                <textarea id="description" placeholder="请详细描述案件情况，包括时间、地点、人物、经过等" maxlength="2000"></textarea>
            </div>
            
            <div class="form-group">
                <label>证据材料（多选）</label>
                <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="contract" style="width:auto"> 合同/协议</label>
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="chat" style="width:auto"> 聊天记录</label>
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="transfer" style="width:auto"> 转账记录</label>
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="audio" style="width:auto"> 录音/录像</label>
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="witness" style="width:auto"> 证人证言</label>
                    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" value="other" style="width:auto"> 其他证据</label>
                </div>
            </div>
            
            <button class="btn" onclick="evaluate()" id="evaluateBtn">开始评估</button>
        </div>
        
        <div class="result-card" id="resultCard">
            <div class="score">
                <div class="score-circle good" id="scoreCircle">
                    <div class="value" id="scoreValue">--</div>
                    <div class="label">胜诉概率</div>
                </div>
            </div>
            
            <div class="result-section">
                <h3>📊 评估结果</h3>
                <p id="resultSummary"></p>
                <div style="margin-top:10px" id="resultTags"></div>
            </div>
            
            <div class="result-section">
                <h3>✅ 有利因素</h3>
                <p id="positiveFactors"></p>
            </div>
            
            <div class="result-section">
                <h3>⚠️ 风险因素</h3>
                <p id="riskFactors"></p>
            </div>
            
            <div class="result-section">
                <h3>💡 专业建议</h3>
                <p id="suggestions"></p>
            </div>
            
            <button class="btn" onclick="window.location.href='/chat.html'" style="margin-top:20px">💬 咨询专业顾问</button>
        </div>
    </div>
    
    <script>
        const userId = localStorage.getItem('user_id');
        
        async function evaluate() {
            const caseType = document.getElementById('caseType').value;
            const description = document.getElementById('description').value.trim();
            
            if (!caseType) {
                showToast('请选择案件类型');
                return;
            }
            
            if (description.length < 20) {
                showToast('请至少输入 20 字的案情描述');
                return;
            }
            
            const btn = document.getElementById('evaluateBtn');
            btn.disabled = true;
            btn.textContent = '评估中...';
            
            // 模拟评估结果（实际应调用 AI API）
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // 模拟评分（随机生成，实际应由 AI 分析）
            const score = Math.floor(Math.random() * 40) + 55; // 55-95
            
            showResult(score, caseType, description);
            
            btn.disabled = false;
            btn.textContent = '重新评估';
        }
        
        function showResult(score, caseType, description) {
            const card = document.getElementById('resultCard');
            const circle = document.getElementById('scoreCircle');
            const value = document.getElementById('scoreValue');
            
            card.classList.add('show');
            value.textContent = score + '%';
            
            // 根据分数设置样式
            circle.className = 'score-circle';
            if (score >= 70) {
                circle.classList.add('good');
            } else if (score >= 50) {
                circle.classList.add('medium');
            } else {
                circle.classList.add('low');
            }
            
            // 填充结果内容
            document.getElementById('resultSummary').textContent = 
                `根据您提供的案情描述，AI 分析认为您的案件胜诉概率约为${score}%。${score >= 70 ? '案件情况较为有利，建议尽快采取法律行动。' : score >= 50 ? '案件存在一定不确定性，建议补充更多证据。' : '案件风险较高，建议咨询专业律师详细分析。'}`;
            
            // 标签
            const tags = document.getElementById('resultTags');
            tags.innerHTML = `
                <span class="tag ${score >= 70 ? 'tag-good' : score >= 50 ? 'tag-medium' : 'tag-low'}">
                    ${score >= 70 ? '胜诉希望较大' : score >= 50 ? '存在一定风险' : '风险较高'}
                </span>
                <span class="tag tag-medium">${getCaseTypeName(caseType)}</span>
            `;
            
            document.getElementById('positiveFactors').textContent = 
                '• 案情描述清晰，事实较为明确\n• 有相关证据支持主张\n• 法律依据充分';
            
            document.getElementById('riskFactors').textContent = 
                '• 证据链可能不够完整\n• 对方可能存在抗辩空间\n• 诉讼周期和成本需要考虑';
            
            document.getElementById('suggestions').textContent = 
                '1. 建议收集并整理所有相关证据\n2. 可先发送律师函尝试和解\n3. 如协商无果，及时提起诉讼避免超过诉讼时效\n4. 复杂案件建议委托专业律师代理';
            
            // 滚动到结果区域
            card.scrollIntoView({behavior: 'smooth'});
        }
        
        function getCaseTypeName(type) {
            const names = {
                'labor': '劳动纠纷',
                'contract': '合同纠纷',
                'marriage': '婚姻家事',
                'debt': '债权债务',
                'traffic': '交通事故',
                'property': '房产纠纷'
            };
            return names[type] || type;
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
