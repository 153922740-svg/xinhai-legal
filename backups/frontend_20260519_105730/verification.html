<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实名认证 - 心海法律 AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            min-height: 100vh;
            padding: 20px;
        }
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        
        .status-card {
            background: linear-gradient(135deg, #1a1f2e, #131825);
            border: 1px solid #1e2538;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .status-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .status-desc {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        .verify-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .info-card {
            background: #1a1f2e;
            border: 1px solid #1e2538;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e2538;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #94a3b8; font-size: 13px; }
        .info-value { font-size: 14px; }
        
        .upload-area {
            background: #1a1f2e;
            border: 2px dashed #1e2538;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 14px;
            color: #94a3b8;
        }
        .upload-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background: #131825;
            border: 1px solid #1e2538;
            border-radius: 8px;
            padding: 12px;
            color: #e8eaed;
            font-size: 14px;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .privacy-notice {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            text-align: center;
        }
        .modal-icon { font-size: 48px; margin-bottom: 16px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
        .modal-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 实名认证</h1>
    </div>
    
    <!-- 认证状态 -->
    <div class="status-card" id="statusCard">
        <div class="status-icon">⏳</div>
        <div class="status-title">未完成实名认证</div>
        <div class="status-desc">根据法律法规要求，使用部分功能需要完成实名认证</div>
        <button class="verify-btn" onclick="startVerification()">开始认证</button>
    </div>
    
    <!-- 认证表单 -->
    <div id="verifyForm" style="display:none;">
        <div class="section-title">个人信息</div>
        <div class="info-card">
            <div class="form-group">
                <div class="form-label">真实姓名</div>
                <input type="text" class="form-input" id="realName" placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <div class="form-label">身份证号</div>
                <input type="text" class="form-input" id="idCard" placeholder="请输入身份证号">
            </div>
            <div class="form-group">
                <div class="form-label">手机号</div>
                <input type="tel" class="form-input" id="phone" placeholder="请输入手机号">
            </div>
        </div>
        
        <div class="section-title">证件上传</div>
        <div class="info-card">
            <div class="upload-area" onclick="uploadIdCard('front')">
                <div class="upload-icon">📄</div>
                <div class="upload-text">上传身份证人像面</div>
                <div class="upload-hint">请确保图片清晰，四角完整</div>
            </div>
            <div class="upload-area" onclick="uploadIdCard('back')">
                <div class="upload-icon">📄</div>
                <div class="upload-text">上传身份证国徽面</div>
                <div class="upload-hint">请确保图片清晰，四角完整</div>
            </div>
        </div>
        
        <button class="submit-btn" onclick="submitVerification()">提交认证</button>
        
        <div class="privacy-notice">
            您的信息将严格保密，仅用于实名认证<br>
            提交即表示同意《隐私政策》和《用户协议》
        </div>
    </div>
    
    <!-- 认证成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon">✅</div>
            <div class="modal-title">认证成功</div>
            <div class="modal-desc">您的实名认证已通过审核</div>
            <button class="modal-btn" onclick="closeModal()">完成</button>
        </div>
    </div>

    <script>
        let verificationStatus = 'unverified'; // unverified, pending, verified
        
        function startVerification() {
            document.getElementById('statusCard').style.display = 'none';
            document.getElementById('verifyForm').style.display = 'block';
        }
        
        function uploadIdCard(side) {
            // TODO: 调用图片上传 API
            alert('请选择身份证' + (side === 'front' ? '人像面' : '国徽面') + '图片');
        }
        
        function submitVerification() {
            const realName = document.getElementById('realName').value;
            const idCard = document.getElementById('idCard').value;
            const phone = document.getElementById('phone').value;
            
            if (!realName || !idCard || !phone) {
                alert('请填写完整信息');
                return;
            }
            
            // TODO: 调用认证 API
            console.log('提交认证:', { realName, idCard, phone });
            
            // 模拟成功
            document.getElementById('successModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
            updateStatus('verified');
        }
        
        function updateStatus(status) {
            verificationStatus = status;
            const card = document.getElementById('statusCard');
            if (status === 'verified') {
                card.innerHTML = `
                    <div class="status-icon">✅</div>
                    <div class="status-title">已完成实名认证</div>
                    <div class="status-desc">您的身份信息已通过验证</div>
                    <div class="verified-badge">✓ 已认证</div>
                `;
            }
        }
        
        // 检查认证状态
        async function checkStatus() {
            try {
                const response = await fetch('/api/user/verification');
                const data = await response.json();
                if (data.verified) {
                    updateStatus('verified');
                }
            } catch (e) {
                console.log('获取认证状态失败');
            }
        }
        
        checkStatus();
    </script>
</body>
</html>
