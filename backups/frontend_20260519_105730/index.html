<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心海法律 AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #131825;
            --bg-card: #1a1f2e;
            --bg-input: #0f1320;
            --border: #1e2538;
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-muted: #5a6478;
            --accent: #6366f1;
            --accent-light: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --user-bubble: #1e1b4b;
            --ai-bubble: #131825;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }
        
        /* ==================== LOGIN PAGE ==================== */
        .login-page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            z-index: 100;
        }
        
        .login-page.hidden { display: none; }
        
        .login-header {
            text-align: center;
            margin-bottom: 48px;
            padding-top: 40px;
        }
        
        .login-logo {
            width: 88px; height: 88px;
            margin: 0 auto 24px;
            border-radius: 24px;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 44px;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.35);
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.35); }
            50% { box-shadow: 0 0 80px rgba(139, 92, 246, 0.5); }
        }
        
        .login-title {
            font-size: 28px; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px; color: var(--text-secondary);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        
        .login-btn {
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-switch {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .login-switch a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .login-error.show { display: block; }
        
        /* ==================== CHAT PAGE ==================== */
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .chat-page.hidden { display: none; }
        
        /* Header */
        .header {
            padding: 16px 20px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
        }
        
        .header-info h1 {
            font-size: 16px; font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .header-info p {
            font-size: 12px; color: var(--text-muted);
            display: flex; align-items: center; gap: 6px;
        }
        
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        
        .header-actions {
            display: flex; gap: 8px;
        }
        
        .header-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        
        .header-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            scroll-behavior: smooth;
        }
        
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        /* Welcome */
        .welcome {
            text-align: center;
            padding: 40px 24px 20px;
        }
        
        .welcome-icon {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.25);
        }
        
        .welcome h2 {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #e8eaed, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .welcome p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        
        /* Quick Actions */
        .quick-actions {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            padding: 16px 20px;
        }
        
        .quick-btn {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 12px; color: var(--text-secondary);
            font-size: 13px; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        
        .quick-btn:hover {
            border-color: var(--accent); color: var(--text-primary);
            background: rgba(99,102,241,0.08);
        }
        
        .quick-btn .icon { font-size: 20px; margin-bottom: 6px; display: block; }
        
        /* Messages */
        .message {
            display: flex; gap: 10px; padding: 8px 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        
        .message.user { flex-direction: row-reverse; }
        
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        
        .message.ai .msg-avatar {
            background: var(--accent-gradient);
            box-shadow: 0 0 12px rgba(99,102,241,0.3);
        }
        
        .message.user .msg-avatar { background: var(--user-bubble); }
        
        .msg-content {
            max-width: 78%; padding: 12px 16px; border-radius: 16px;
            font-size: 14px; line-height: 1.7; word-break: break-word;
        }
        
        .message.ai .msg-content {
            background: var(--ai-bubble); border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }
        
        .message.user .msg-content {
            background: var(--user-bubble); border: 1px solid rgba(99,102,241,0.2);
            border-top-right-radius: 4px;
        }
        
        .msg-content p { margin-bottom: 8px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content strong { color: var(--accent-light); }
        .msg-content code {
            background: rgba(99,102,241,0.1); padding: 2px 6px;
            border-radius: 4px; font-size: 13px;
        }
        .msg-content ul, .msg-content ol { padding-left: 20px; margin-bottom: 8px; }
        
        /* ==================== CARD TYPES ==================== */
        /* Card Base */
        .msg-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        /* Pricing Card */
        .card-pricing {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.05));
        }
        
        .card-pricing .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(99,102,241,0.05);
        }
        
        .card-pricing .card-title {
            font-size: 16px; font-weight: 600; color: var(--text-primary);
            display: flex; align-items: center; gap: 8px;
        }
        
        .card-pricing .card-body { padding: 16px; }
        
        .pricing-item {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        
        .pricing-item:last-child { border-bottom: none; }
        
        .pricing-label { color: var(--text-secondary); font-size: 13px; }
        .pricing-value { color: var(--text-primary); font-weight: 500; }
        .pricing-value.highlight { color: var(--accent-light); font-size: 18px; }
        
        .card-pricing .card-footer {
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
        }
        
        /* Product Card */
        .card-product {
            display: flex; gap: 12px; padding: 12px;
        }
        
        .product-image {
            width: 80px; height: 80px;
            border-radius: 10px;
            background: var(--bg-secondary);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        
        .product-info { flex: 1; min-width: 0; }
        
        .product-name {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            margin-bottom: 6px;
        }
        
        .product-desc {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 8px; line-height: 1.5;
        }
        
        .product-price {
            font-size: 18px; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* Document Card */
        .card-document {
            padding: 14px;
        }
        
        .doc-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .doc-item:last-child { margin-bottom: 0; }
        
        .doc-item:hover {
            background: rgba(99,102,241,0.1);
            border-color: var(--accent);
        }
        
        .doc-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: rgba(99,102,241,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .doc-info { flex: 1; min-width: 0; }
        
        .doc-name {
            font-size: 14px; font-weight: 500; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .doc-meta {
            font-size: 11px; color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Order Card */
        .card-order {
            padding: 16px;
        }
        
        .order-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        
        .order-id {
            font-size: 12px; color: var(--text-muted);
        }
        
        .order-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px; font-weight: 500;
        }
        
        .order-status.pending {
            background: rgba(245,158,11,0.15);
            color: var(--warning);
        }
        
        .order-status.completed {
            background: rgba(34,197,94,0.15);
            color: var(--success);
        }
        
        .order-status.cancelled {
            background: rgba(239,68,68,0.15);
            color: var(--error);
        }
        
        .order-items {
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin-bottom: 12px;
        }
        
        .order-item {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 13px;
        }
        
        .order-item-name { color: var(--text-secondary); }
        .order-item-price { color: var(--text-primary); font-weight: 500; }
        
        .order-total {
            display: flex; justify-content: space-between;
            font-size: 15px;
        }
        
        .order-total-label { color: var(--text-secondary); }
        .order-total-value { 
            color: var(--accent-light); 
            font-weight: 700; font-size: 18px;
        }
        
        /* Button Card */
        .card-buttons {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 12px;
        }
        
        .action-btn {
            flex: 1; min-width: 120px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 13px; font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            background: rgba(99,102,241,0.1);
        }
        
        .action-btn.primary {
            background: var(--accent-gradient);
            border: none;
        }
        
        .action-btn.primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        /* Typing Indicator */
        .typing {
            display: flex; gap: 10px; padding: 8px 16px;
        }
        
        .typing-dots {
            display: flex; gap: 4px; padding: 16px;
        }
        
        .typing-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%,60%,100%{transform:translateY(0)}
            30%{transform:translateY(-8px)}
        }
        
        /* Input Area */
        .input-area {
            padding: 12px 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .input-row {
            display: flex; gap: 10px; align-items: flex-end;
        }
        
        .input-wrapper {
            flex: 1; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; transition: border-color 0.2s;
        }
        
        .input-wrapper:focus-within { border-color: var(--accent); }
        
        textarea {
            width: 100%; background: transparent; border: none; color: var(--text-primary);
            font-size: 14px; padding: 12px 16px; resize: none; outline: none;
            font-family: inherit; line-height: 1.5; max-height: 120px;
        }
        
        textarea::placeholder { color: var(--text-muted); }
        
        .send-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--accent-gradient);
            border: none; color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(99,102,241,0.4);
        }
        
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .disclaimer {
            text-align: center; font-size: 11px;
            color: var(--text-muted); margin-top: 8px;
        }
        
        /* Error Message */
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5; padding: 10px 14px; border-radius: 10px;
            font-size: 13px; margin: 8px 16px;
        }
        
        /* User Info Bar */
        .user-info-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .user-info-bar .user-email {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        
        .logout-btn {
            color: var(--text-muted); cursor: pointer;
            padding: 4px 8px; border-radius: 6px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: rgba(239,68,68,0.1);
            color: var(--error);
        }

        /* ==================== 响应式设计 ==================== */
        /* 断点：375px（小屏手机）、768px（平板）、1024px（小屏电脑）、1200px（大屏电脑） */

        /* 375px - 小屏手机优化 */
        @media (max-width: 375px) {
            .app-container {
                max-width: 100%;
            }

            .login-page {
                padding: 24px 16px;
            }

            .login-logo {
                width: 72px; height: 72px;
                font-size: 36px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-subtitle {
                font-size: 13px;
            }

            .input-group input {
                padding: 14px 16px;
                font-size: 14px;
            }

            .login-btn {
                padding: 14px;
                font-size: 15px;
            }

            .header {
                padding: 12px 16px;
            }

            .header-avatar {
                width: 36px; height: 36px;
                font-size: 18px;
            }

            .header-info h1 {
                font-size: 14px;
            }

            .header-info p {
                font-size: 11px;
            }

            .header-btn {
                width: 32px; height: 32px;
                font-size: 14px;
            }

            .welcome-icon {
                width: 64px; height: 64px;
                font-size: 32px;
            }

            .welcome h2 {
                font-size: 18px;
            }

            .welcome p {
                font-size: 13px;
            }

            .quick-actions {
                grid-template-columns: 1fr;
                padding: 12px 16px;
            }

            .quick-btn {
                padding: 12px;
                font-size: 13px;
            }

            .quick-btn .icon {
                font-size: 18px;
            }

            .msg-content {
                max-width: 85%;
                font-size: 13px;
            }

            .msg-avatar {
                width: 28px; height: 28px;
                font-size: 14px;
            }

            .input-area {
                padding: 10px 12px 16px;
            }

            textarea {
                font-size: 13px;
                padding: 10px 12px;
            }

            .send-btn {
                width: 40px; height: 40px;
                font-size: 16px;
            }

            .disclaimer {
                font-size: 10px;
            }

            .user-info-bar {
                padding: 6px 12px;
                font-size: 12px;
            }

            /* 卡片适配 */
            .card-pricing .card-header,
            .card-pricing .card-body,
            .card-pricing .card-footer {
                padding: 12px;
            }

            .card-product {
                padding: 10px;
            }

            .product-image {
                width: 64px; height: 64px;
                font-size: 28px;
            }

            .doc-item {
                padding: 10px;
            }

            .doc-icon {
                width: 36px; height: 36px;
                font-size: 18px;
            }
        }

        /* 768px - 平板适配 */
        @media (min-width: 376px) and (max-width: 768px) {
            .app-container {
                max-width: 600px;
            }

            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }

            .login-header {
                margin-bottom: 40px;
            }

            .welcome {
                padding: 32px 20px 16px;
            }

            .msg-content {
                max-width: 80%;
            }
        }

        /* 1024px - 小屏电脑适配 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .app-container {
                max-width: 800px;
                height: 90vh;
                margin: 5vh auto;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }

            body {
                background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            }

            .quick-actions {
                grid-template-columns: repeat(4, 1fr);
                padding: 16px 24px;
            }

            .login-page {
                padding: 40px 32px;
            }

            .header {
                padding: 16px 24px;
            }

            .chat-area {
                padding: 20px 0;
            }

            .input-area {
                padding: 16px 20px 24px;
            }

            .msg-content {
                max-width: 75%;
            }
        }

        /* 1200px - 大屏电脑适配 */
        @media (min-width: 1025px) {
            .app-container {
                max-width: 1000px;
                height: 85vh;
                margin: 7.5vh auto;
                border-radius: 20px;
                box-shadow: 0 12px 48px rgba(99, 102, 241, 0.15);

            body {
                background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary, #1e2438) 50%, var(--bg-primary) 100%);

            .login-page {

            .login-logo {

                font-size: 48px;
            }

            .login-title {
                font-size: 32px;
            }

            .login-subtitle {
                font-size: 15px;
            }

            .input-group input {
                padding: 18px 24px;
                font-size: 16px;
            }

            .login-btn {
                padding: 18px;
                font-size: 17px;
            }

            .header {
                padding: 20px 32px;
            }

            .header-avatar {
                width: 48px; height: 48px;
                font-size: 24px;
            }

            .header-info h1 {
                font-size: 18px;
            }

            .header-info p {
                font-size: 13px;
            }

            .header-btn {
                width: 40px; height: 40px;
                font-size: 18px;
            }

            .welcome {
                padding: 48px 32px 24px;
            }

            .welcome-icon {
                width: 96px; height: 96px;
                font-size: 48px;
            }

            .welcome h2 {
                font-size: 26px;
            }

            .welcome p {
                font-size: 15px;
            }

            .quick-actions {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                padding: 20px 32px;
            }

            .quick-btn {
                padding: 18px 16px;
                font-size: 14px;
            }

            .quick-btn .icon {
                font-size: 24px;
            }

            .chat-area {
                padding: 24px 0;
            }

            .message {
                padding: 12px 24px;
            }

            .msg-content {
                max-width: 70%;
                font-size: 15px;
                padding: 14px 18px;
            }

            .msg-avatar {
                width: 36px; height: 36px;
                font-size: 18px;
            }

            .input-area {
                padding: 16px 24px 28px;
            }

            textarea {
                font-size: 15px;
                padding: 14px 18px;
            }

            .send-btn {
                width: 48px; height: 48px;
                font-size: 20px;
            }

            .disclaimer {
                font-size: 12px;
                margin-top: 12px;
            }

            .user-info-bar {
                padding: 10px 24px;
                font-size: 14px;
            }

            /* 卡片适配 */
            .card-pricing .card-header,
            .card-pricing .card-body,
            .card-pricing .card-footer {
                padding: 20px;
            }

            .card-product {
                padding: 16px;
                gap: 16px;
            }

            .product-image {
                width: 96px; height: 96px;
                font-size: 40px;
            }

            .product-name {
                font-size: 17px;
            }

            .product-desc {
                font-size: 13px;
            }

            .product-price {
                font-size: 22px;
            }

            .doc-item {
                padding: 16px;
            }

            .doc-icon {
                width: 48px; height: 48px;
                font-size: 24px;
            }

            .doc-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ==================== LOGIN PAGE ==================== -->
        <div class="login-page" id="loginPage">
            <div class="login-header">
                <div class="login-logo">⚖️</div>
                <h1 class="login-title">心海法律 AI</h1>
                <p class="login-subtitle">专业的智能法律咨询服务</p>
            </div>
            
            <div class="login-error" id="loginError"></div>
            
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="邮箱地址" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
            </form>
            
            <div class="login-switch">
                <span id="switchText">还没有账号？</span>
                <a onclick="toggleLoginMode()" id="switchLink">立即注册</a>
            </div>
        </div>
        
        <!-- ==================== CHAT PAGE ==================== -->
        <div class="chat-page hidden" id="chatPage">
            <!-- User Info Bar -->
            <div class="user-info-bar">
                <span class="user-email" id="userEmailDisplay"></span>
                <span class="logout-btn" onclick="logout()">退出</span>
            </div>
            
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="header-avatar">⚖️</div>
                    <div class="header-info">
                        <h1>心海法律 AI</h1>
                        <p><span class="status-dot" style="display:inline-block;vertical-align:middle"></span>在线 · 随时为您服务</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="clearChat()" title="清除对话">🗑️</button>
                    <button class="header-btn" onclick="toggleSettings()" title="设置">⚙️</button>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome -->
                <div class="welcome" id="welcomeBlock">
                    <div class="welcome-icon">⚖️</div>
                    <h2>心海法律 AI 助手</h2>
                    <p>专业的法律 AI 助手，为您提供智能法律咨询服务</p>
                </div>
                
                <!-- Quick Actions -->
                <div class="quick-actions" id="quickActions">
                    <button class="quick-btn" onclick="sendQuick('劳动合同纠纷如何处理？')">
                        <span class="icon">📋</span>劳动合同纠纷
                    </button>
                    <button class="quick-btn" onclick="sendQuick('离婚需要准备什么材料？')">
                        <span class="icon">👨‍👩‍👧</span>婚姻家庭问题
                    </button>
                    <button class="quick-btn" onclick="sendQuick('公司欠款不还怎么办？')">
                        <span class="icon">💰</span>债务纠纷
                    </button>
                    <button class="quick-btn" onclick="sendQuick('交通事故赔偿标准是什么？')">
                        <span class="icon">🚗</span>交通事故
                    </button>
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing" id="typingIndicator" style="display:none; padding: 0 16px;">
                <div class="msg-avatar" style="background: var(--accent-gradient); box-shadow: 0 0 12px rgba(99,102,241,0.3);">⚖️</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <div class="input-row">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="输入您的法律问题..." rows="1" 
                            onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
                <div class="disclaimer">⚠️ AI 回复仅供参考，重要法律问题请咨询专业律师</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== Configuration ====================
        const API_BASE = 'http://8.218.93.213/api';
        let API_KEY = localStorage.getItem('xinclaw_token') || '';
        const MODEL = 'qwen3.5-plus';
        
        // ==================== State ====================
        let messages = JSON.parse(localStorage.getItem('xinclaw_messages') || '[]');
        let isStreaming = false;
        let currentSessionId = localStorage.getItem('xinclaw_session_id') || null;
        let isLoginMode = true; // true = login, false = register
        let currentUser = JSON.parse(localStorage.getItem('xinclaw_user') || 'null');
        
        // ==================== DOM Elements ====================
        const loginPage = document.getElementById('loginPage');
        const chatPage = document.getElementById('chatPage');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');
        const switchText = document.getElementById('switchText');
        const switchLink = document.getElementById('switchLink');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcomeBlock = document.getElementById('welcomeBlock');
        const quickActions = document.getElementById('quickActions');
        
        // ==================== Init ====================
        function init() {
            if (currentUser && API_KEY) {
                showChatPage();
            } else {
                showLoginPage();
            }
        }
        
        function showLoginPage() {
            loginPage.classList.remove('hidden');
            chatPage.classList.add('hidden');
        }
        
        function showChatPage() {
            loginPage.classList.add('hidden');
            chatPage.classList.remove('hidden');
            if (currentUser) {
                userEmailDisplay.textContent = currentUser.email || currentUser.username || '用户';
            }
            // 恢复历史消息
            if (messages.length > 0) {
                messages.forEach(msg => {
                    addMessage(msg.role, msg.content);
                });
                chatArea.scrollTop = chatArea.scrollHeight;
            }
            messageInput.focus();
        }
        
        // ==================== Auth Functions ====================
        function toggleLoginMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                loginBtn.textContent = '登录';
            } else {
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                loginBtn.textContent = '注册';
            }
            loginError.classList.remove('show');
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showLoginError('请填写邮箱和密码');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = isLoginMode ? '登录中...' : '注册中...';
            
            try {
                const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || (isLoginMode ? '登录失败' : '注册失败'));
                }
                
                // Save token and user info
                API_KEY = data.token || data.access_token || '';
                currentUser = { email, ...data.user };
                
                localStorage.setItem('xinclaw_token', API_KEY);
                localStorage.setItem('xinclaw_user', JSON.stringify(currentUser));
                
                showChatPage();
                
            } catch (error) {
                console.error('Auth error:', error);
                showLoginError(error.message || '网络错误，请稍后重试');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = isLoginMode ? '登录' : '注册';
            }
        }
        
        function showLoginError(msg) {
            loginError.textContent = msg;
            loginError.classList.add('show');
        }
        
        function logout() {
            localStorage.removeItem('xinclaw_token');
            localStorage.removeItem('xinclaw_user');
            localStorage.removeItem('xinclaw_messages');
            localStorage.removeItem('xinclaw_session_id');
            API_KEY = '';
            currentUser = null;
            messages = [];
            currentSessionId = null;
            showLoginPage();
            // Reset chat UI
            if (welcomeBlock) welcomeBlock.style.display = 'block';
            if (quickActions) quickActions.style.display = 'grid';
            // Remove all messages
            const existingMsgs = chatArea.querySelectorAll('.message, .error-msg');
            existingMsgs.forEach(m => m.remove());
        }
        
        // ==================== Chat Functions ====================
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function sendQuick(text) {
            messageInput.value = text;
            sendMessage();
        }
        
        function clearChat() {
            messages = [];
            currentSessionId = null;
            localStorage.removeItem('xinclaw_messages');
            localStorage.removeItem('xinclaw_session_id');
            if (welcomeBlock) welcomeBlock.style.display = 'block';
            if (quickActions) quickActions.style.display = 'grid';
            const existingMsgs = chatArea.querySelectorAll('.message, .error-msg, .typing');
            existingMsgs.forEach(m => {
                if (m.id !== 'typingIndicator') m.remove();
            });
        }
        
        function toggleSettings() {
            alert('设置功能开发中...');
        }
        
        // ==================== Message Formatting ====================
        function formatMessage(text) {
            if (!text) return '';
            let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }
        
        // ==================== Render Cards ====================
        function renderCard(type, data) {
            switch(type) {
                case 'card_pricing':
                    return `
                        <div class="msg-card card-pricing">
                            <div class="card-header">
                                <div class="card-title">⚖️ ${data.title || '服务定价'}</div>
                            </div>
                            <div class="card-body">
                                ${(data.items || []).map(item => `
                                    <div class="pricing-item">
                                        <span class="pricing-label">${item.label}</span>
                                        <span class="pricing-value ${item.highlight ? 'highlight' : ''}">${item.value}</span>
                                    </div>
                                `).join('')}
                            </div>
                            ${data.footer ? `<div class="card-footer">${data.footer}</div>` : ''}
                        </div>
                    `;
                    
                case 'card_product':
                    return `
                        <div class="msg-card card-product">
                            <div class="product-image">${data.icon || '📦'}</div>
                            <div class="product-info">
                                <div class="product-name">${data.name || '法律服务'}</div>
                                <div class="product-desc">${data.description || ''}</div>
                                <div class="product-price">${data.price || '¥0'}</div>
                            </div>
                        </div>
                    `;
                    
                case 'card_document':
                    return `
                        <div class="msg-card card-document">
                            ${(data.documents || []).map((doc, i) => `
                                <div class="doc-item" onclick="handleDocClick('${doc.id || i}')">
                                    <div class="doc-icon">📄</div>
                                    <div class="doc-info">
                                        <div class="doc-name">${doc.name || '文档'}</div>
                                        <div class="doc-meta">${doc.size || ''} · ${doc.date || ''}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    
                case 'card_order':
                    const statusClass = data.status === 'completed' ? 'completed' : 
                                       data.status === 'cancelled' ? 'cancelled' : 'pending';
                    const statusText = data.status === 'completed' ? '已完成' : 
                                      data.status === 'cancelled' ? '已取消' : '处理中';
                    return `
                        <div class="msg-card card-order">
                            <div class="order-header">
                                <span class="order-id">订单号：${data.orderId || 'N/A'}</span>
                                <span class="order-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="order-items">
                                ${(data.items || []).map(item => `
                                    <div class="order-item">
                                        <span class="order-item-name">${item.name}</span>
                                        <span class="order-item-price">${item.price}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="order-total">
                                <span class="order-total-label">总计</span>
                                <span class="order-total-value">${data.total || '¥0'}</span>
                            </div>
                        </div>
                    `;
                    
                case 'button':
                    return `
                        <div class="msg-card card-buttons">
                            ${(data.buttons || []).map(btn => `
                                <button class="action-btn ${btn.primary ? 'primary' : ''}" 
                                    onclick="handleButtonClick('${btn.action || ''}', '${btn.text || ''}')">
                                    ${btn.icon || ''} ${btn.text}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    
                default:
                    return '';
            }
        }
        
        function handleDocClick(docId) {
            console.log('Document clicked:', docId);
            // TODO: Implement document download/view
        }
        
        function handleButtonClick(action, text) {
            console.log('Button clicked:', action, text);
            messageInput.value = text;
            sendMessage();
        }
        
        // ==================== Add Message to UI ====================
        function addMessage(role, content, cards = []) {
            if (welcomeBlock) welcomeBlock.style.display = 'none';
            if (quickActions) quickActions.style.display = 'none';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = role === 'ai' ? '⚖️' : '👤';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            contentDiv.innerHTML = formatMessage(content);
            
            // Render cards if any
            cards.forEach(card => {
                const cardHtml = renderCard(card.type, card.data);
                contentDiv.insertAdjacentHTML('beforeend', cardHtml);
            });
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            return contentDiv;
        }
        
        // ==================== Typing Indicator ====================
        function showTyping() {
            typingIndicator.style.display = 'flex';
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideTyping() {
            typingIndicator.style.display = 'none';
        }
        
        // ==================== Parse AI Response with Cards ====================
        function parseResponseWithCards(content) {
            // Try to parse content as JSON for structured response
            try {
                const parsed = JSON.parse(content);
                if (parsed.content && parsed.cards) {
                    return { text: parsed.content, cards: parsed.cards };
                }
            } catch (e) {
                // Not JSON, return as plain text
            }
            return { text: content, cards: [] };
        }
        
        // ==================== Send Message ====================
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isStreaming) return;
            
            isStreaming = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Add user message to UI
            addMessage('user', text);
            messages.push({ role: 'user', content: text });
            localStorage.setItem('xinclaw_messages', JSON.stringify(messages));
            
            // Show typing
            showTyping();
            
            // Build request headers
            const headers = {
                'Content-Type': 'application/json'
            };
            if (API_KEY) {
                headers['Authorization'] = `Bearer ${API_KEY}`;
            }
            if (currentSessionId) {
                headers['X-Hermes-Session-Id'] = currentSessionId;
            }
            
            try {
                const response = await fetch(`${API_BASE}/v1/chat/completions`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API 错误：${response.status} ${response.statusText}`);
                }
                
                // Save session id from response
                const newSessionId = response.headers.get('X-Hermes-Session-Id');
                if (newSessionId) {
                    currentSessionId = newSessionId;
                    localStorage.setItem('xinclaw_session_id', newSessionId);
                }
                
                hideTyping();
                
                // Add AI message placeholder
                const aiContentDiv = addMessage('ai', '');
                let fullContent = '';
                
                // Check if streaming or regular JSON
                const contentType = response.headers.get('Content-Type') || '';
                
                if (contentType.includes('text/event-stream') || response.body) {
                    // SSE Streaming
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\\n');
                        buffer = lines.pop() || '';
                        
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;
                            
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta?.content || '';
                                if (delta) {
                                    fullContent += delta;
                                    const parsed = parseResponseWithCards(fullContent);
                                    aiContentDiv.innerHTML = formatMessage(parsed.text);
                                    // Clear existing cards and re-render
                                    const existingCards = aiContentDiv.querySelectorAll('.msg-card');
                                    existingCards.forEach(c => c.remove());
                                    parsed.cards.forEach(card => {
                                        const cardHtml = renderCard(card.type, card.data);
                                        aiContentDiv.insertAdjacentHTML('beforeend', cardHtml);
                                    });
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                            } catch (e) { /* skip malformed chunks */ }
                        }
                    }
                } else {
                    // Regular JSON response
                    const data = await response.json();
                    fullContent = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回复。';
                    const parsed = parseResponseWithCards(fullContent);
                    aiContentDiv.innerHTML = formatMessage(parsed.text);
                    parsed.cards.forEach(card => {
                        const cardHtml = renderCard(card.type, card.data);
                        aiContentDiv.insertAdjacentHTML('beforeend', cardHtml);
                    });
                }
                
                messages.push({ role: 'assistant', content: fullContent });
                localStorage.setItem('xinclaw_messages', JSON.stringify(messages));
                
            } catch (error) {
                hideTyping();
                console.error('Chat error:', error);
                
                // Show error in chat
                const errDiv = document.createElement('div');
                errDiv.className = 'error-msg';
                errDiv.textContent = `❌ ${error.message || '网络错误，请稍后重试'}`;
                chatArea.appendChild(errDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
                
                // Remove the failed user message from history
                messages.pop();
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
        
        // Start app
        init();
    </script>
