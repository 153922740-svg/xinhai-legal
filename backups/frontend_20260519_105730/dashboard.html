<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板 - 心海法律 AI</title>
    <style>
        :root{--bg-primary:#0a0e1a;--bg-secondary:#131825;--border:#1e2538;--text-primary:#e8eaed;--text-secondary:#94a3b8;--accent-primary:#6366f1;--success:#22c55e}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .header{text-align:center;padding:40px 20px;background:linear-gradient(135deg,var(--bg-secondary),#1a1f2e);border-radius:16px;margin-bottom:30px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:30px}
        .stat-card h3{font-size:14px;color:var(--text-secondary);margin-bottom:10px}
        .stat-value{font-size:36px;font-weight:700;color:var(--accent-primary)}
        .stat-label{font-size:14px;color:var(--text-secondary);margin-top:8px}
        .section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:30px;margin-bottom:30px}
        .section h2{font-size:20px;margin-bottom:20px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📊 数据看板</h1><p>实时业务数据统计</p></div>
        <div class="stats-grid">
            <div class="stat-card"><h3>总用户数</h3><div class="stat-value" id="totalUsers">-</div><div class="stat-label">累计注册用户</div></div>
            <div class="stat-card"><h3>今日收入</h3><div class="stat-value" id="todayRevenue">¥-</div><div class="stat-label">会员+Token</div></div>
            <div class="stat-card"><h3>Token 消耗</h3><div class="stat-value" id="todayTokens">-</div><div class="stat-label">今日消耗量</div></div>
            <div class="stat-card"><h3>AI 会话</h3><div class="stat-value" id="todaySessions">-</div><div class="stat-label">今日会话数</div></div>
        </div>
        <div class="section"><h2>📈 收入统计（7 天）</h2><div id="revenueStats">加载中...</div></div>
        <div class="section"><h2>💰 Token 统计（7 天）</h2><div id="tokenStats">加载中...</div></div>
    </div>
    <script>
        async function loadDashboard(){try{
            const r=await fetch('/api/v1/dashboard/summary');
            const d=await r.json();
            document.getElementById('totalUsers').textContent=d.users.total_users||'-';
            document.getElementById('todayRevenue').textContent='¥'+(d.revenue.total_revenue||0);
            document.getElementById('todayTokens').textContent=(d.tokens.tokens_consumed||0).toLocaleString();
            document.getElementById('todaySessions').textContent=d.ai_usage.total_sessions||'-';
            document.getElementById('revenueStats').innerHTML='<p>会员收入：¥'+(d.revenue.member_revenue||0)+'</p><p>Token 收入：¥'+(d.revenue.token_revenue||0)+'</p>';
            document.getElementById('tokenStats').innerHTML='<p>充值：'+(d.tokens.tokens_recharged||0).toLocaleString()+'</p><p>消耗：'+(d.tokens.tokens_consumed||0).toLocaleString()+'</p>';
        }catch(e){console.error('加载失败:',e);}}
        loadDashboard();
        setInterval(loadDashboard,60000);
    </script>
</body>
</html>
