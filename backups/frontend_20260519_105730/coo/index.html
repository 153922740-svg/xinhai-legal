<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心海法律 AI · COO 管理后台</title>
    <style>
        :root{--bg-primary:#0a0e1a;--bg-secondary:#131825;--bg-card:#1a1f2e;--border:#1e2538;--text-primary:#e8eaed;--text-secondary:#94a3b8;--accent:#6366f1;--accent-gradient:linear-gradient(135deg,#6366f1,#8b5cf6);--success:#22c55e;--error:#ef4444}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden}
        .app{max-width:480px;height:100vh;margin:0 auto;display:flex;flex-direction:column}
        .header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .header-title{font-size:17px;font-weight:600}
        .header-subtitle{font-size:12px;color:var(--text-secondary)}
        .chat-area{flex:1;overflow-y:auto;padding:16px 0}
        .welcome{text-align:center;padding:40px 24px}
        .welcome-icon{width:80px;height:80px;margin:0 auto 20px;border-radius:24px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-size:40px}
        .message{display:flex;padding:12px 20px;gap:12px}
        .message.user{flex-direction:row-reverse}
        .avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .message.ai .avatar{background:var(--accent-gradient)}
        .message.user .avatar{background:var(--bg-card);border:1px solid var(--border)}
        .bubble{max-width:70%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.6}
        .message.ai .bubble{background:var(--bg-card);border:1px solid var(--border)}
        .message.user .bubble{background:#1e1b4b}
        .data-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:8px 0}
        .data-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .data-item{background:#0f1320;padding:12px;border-radius:8px}
        .data-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
        .data-value{font-size:18px;font-weight:600;color:var(--accent)}
        .quick-cmds{display:flex;flex-wrap:wrap;gap:8px;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg-secondary)}
        .quick-btn{padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-secondary);cursor:pointer}
        .quick-btn:hover{border-color:var(--accent);color:var(--text-primary)}
        .input-area{padding:12px 16px;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;gap:12px}
        .input-wrap{flex:1;background:#0f1320;border:1px solid var(--border);border-radius:16px;padding:8px 16px}
        #msgInput{width:100%;background:transparent;border:none;color:var(--text-primary);font-size:15px;outline:none;resize:none;max-height:120px}
        .send-btn{width:40px;height:40px;border-radius:12px;background:var(--accent-gradient);border:none;color:white;cursor:pointer}
        .typing{display:flex;gap:4px;padding:12px 16px}
        .typing span{width:8px;height:8px;background:var(--text-secondary);border-radius:50%;animation:bounce 1.4s infinite}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:0.3s;z-index:1000}
        .toast.show{opacity:1}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px}
        .modal-btns{display:flex;gap:12px;margin-top:20px}
        .modal-btn{flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer}
        .modal-btn.cancel{background:var(--bg-card);color:var(--text-secondary)}
        .modal-btn.confirm{background:var(--error);color:white}
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div><div class="header-title">心海法律 AI</div><div class="header-subtitle">COO 管理后台</div></div>
            <div style="display:flex;gap:8px">
                <button onclick="clearChat()" style="width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer">🗑️</button>
                <button onclick="logout()" style="width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer">🚪</button>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">👔</div>
                <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">COO 管理后台</h2>
                <p style="color:var(--text-secondary);font-size:14px">通过对话管理后台·查看数据·管理用户</p>
            </div>
            <div id="messages"></div>
        </div>
        <div class="quick-cmds">
            <button class="quick-btn" onclick="sendQuick('今日数据')">📊 今日数据</button>
            <button class="quick-btn" onclick="sendQuick('用户列表')">👥 用户列表</button>
            <button class="quick-btn" onclick="sendQuick('订单统计')">💰 订单统计</button>
            <button class="quick-btn" onclick="sendQuick('Token 消耗')">⚡ Token</button>
            <button class="quick-btn" onclick="sendQuick('帮助')">❓ 帮助</button>
        </div>
        <div class="input-area">
            <div class="input-wrap"><textarea id="msgInput" placeholder="输入管理指令..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea></div>
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="clearModal">
        <div class="modal">
            <div style="font-size:18px;font-weight:600;margin-bottom:16px">确认清除对话？</div>
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="hideClear()">取消</button>
                <button class="modal-btn confirm" onclick="doClear()">清除</button>
            </div>
        </div>
    </div>
    <script>
        let sessionId=null,messages=[],token=localStorage.getItem('coo_token');
        window.onload=function(){if(!token){window.location.href='login.html';return}loadMsgs();checkAuth()};
        async function checkAuth(){try{const res=await fetch('/api/v6/auth/check',{headers:{'Authorization':'Bearer '+token}});const data=await res.json();if(!data.data?.logged_in)logout()}catch(e){}}
        function loadMsgs(){const saved=localStorage.getItem('coo_messages');if(saved){messages=JSON.parse(saved);messages.forEach(m=>renderMsg(m));if(messages.length>0)document.getElementById('welcome').style.display='none';scrollToBottom()}}
        function saveMsgs(){localStorage.setItem('coo_messages',JSON.stringify(messages))}
        function renderMsg(msg){const div=document.createElement('div');div.className='message '+msg.role;div.innerHTML='<div class="avatar">'+(msg.role==='user'?'👤':'🤖')+'</div><div class="bubble">'+formatContent(msg.content)+'</div>';document.getElementById('messages').appendChild(div);scrollToBottom()}
        function formatContent(c){return c.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}
        function scrollToBottom(){document.getElementById('chatArea').scrollTop=document.getElementById('chatArea').scrollHeight}
        function sendMsg(){const input=document.getElementById('msgInput'),msg=input.value.trim();if(!msg)return;document.getElementById('welcome').style.display='none';messages.push({role:'user',content:msg});renderMsg({role:'user',content:msg});saveMsgs();input.value='';showTyping();sendStream(msg)}
        function sendQuick(cmd){document.getElementById('msgInput').value=cmd;sendMsg()}
        function sendStream(msg){if(!sessionId)sessionId='coo_'+Date.now();fetch('/api/v6/chat/stream?session_id='+sessionId,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({message:msg,session_id:sessionId})}).then(r=>r.body.getReader()).then(reader=>readStream(reader,'')).catch(err=>{hideTyping();toast('请求失败','error')})}
        function readStream(reader,fullReply){return reader.read().then(({done,value})=>{if(done){hideTyping();return}const chunk=new TextDecoder().decode(value);const lines=chunk.split('\n').filter(l=>l.startsWith('data: '));for(const line of lines){try{const data=JSON.parse(line.slice(6));if(data.session_id)sessionId=data.session_id;if(data.token){fullReply+=data.token;updateTyping(fullReply)}if(data.done){hideTyping();messages.push({role:'assistant',content:fullReply});saveMsgs();return}if(data.error){hideTyping();toast(data.error,'error');return}}catch(e){}}return readStream(reader,fullReply)})}
        function showTyping(){if(document.querySelector('.typing'))return;const div=document.createElement('div');div.className='typing';div.id='typingIndicator';div.innerHTML='<span></span><span></span><span></span>';document.getElementById('messages').appendChild(div);scrollToBottom()}
        function hideTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()}
        function updateTyping(content){const el=document.getElementById('typingIndicator');if(el)el.innerHTML='<div class="bubble">'+content.replace(/\n/g,'<br>')+'</div>'}
        function clearChat(){document.getElementById('clearModal').classList.add('show')}
        function hideClear(){document.getElementById('clearModal').classList.remove('show')}
        function doClear(){messages=[];localStorage.removeItem('coo_messages');document.getElementById('messages').innerHTML='';document.getElementById('welcome').style.display='block';hideClear();toast('对话已清除','success')}
        function logout(){localStorage.removeItem('coo_token');localStorage.removeItem('coo_messages');window.location.href='login.html'}
        function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.classList.remove('show'),3000)}
        document.getElementById('msgInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
    </script>
</body>
</html>
