<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知 - 心海法律 AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .clear-btn {
            background: transparent;
            border: 1px solid #1e2538;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-tab {
            background: #131825;
            border: 1px solid #1e2538;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        .filter-tab.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        
        .notification-list {
            display: flex;
            flex-direction: column;
        }
        .notification-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #1a1f2e;
            border: 1px solid #1e2538;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .notification-item:hover {
            border-color: #6366f1;
        }
        .notification-item.unread {
            background: rgba(99, 102, 241, 0.05);
            border-left: 3px solid #6366f1;
        }
        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #131825;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .notification-content {
            flex: 1;
        }
        .notification-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .notification-desc {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .notification-time {
            font-size: 12px;
            color: #94a3b8;
        }
        .notification-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .settings-card {
            background: #1a1f2e;
            border: 1px solid #1e2538;
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
        }
        .settings-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e2538;
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-label { font-size: 13px; }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #131825;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch.on {
            background: #6366f1;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle-switch.on::after {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔔 消息通知</h1>
        <button class="clear-btn" onclick="clearAll()">清空全部</button>
    </div>
    
    <div class="filter-tabs">
        <div class="filter-tab active" onclick="filterType('all', this)">全部</div>
        <div class="filter-tab" onclick="filterType('system', this)">系统通知</div>
        <div class="filter-tab" onclick="filterType('order', this)">订单消息</div>
        <div class="filter-tab" onclick="filterType('activity', this)">活动提醒</div>
    </div>
    
    <div class="notification-list" id="notificationList">
        <!-- 由 JS 加载 -->
    </div>
    
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">📭</div>
        <p>暂无消息</p>
        <p style="font-size:12px;margin-top:8px;">有新消息时会在这里显示</p>
    </div>
    
    <!-- 通知设置 -->
    <div class="settings-card">
        <div class="settings-title">🔧 通知设置</div>
        <div class="setting-item">
            <span class="setting-label">系统通知</span>
            <div class="toggle-switch on" onclick="toggleSetting(this)"></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">订单消息</span>
            <div class="toggle-switch on" onclick="toggleSetting(this)"></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">活动提醒</span>
            <div class="toggle-switch on" onclick="toggleSetting(this)"></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">推送通知</span>
            <div class="toggle-switch" onclick="toggleSetting(this)"></div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let notifications = [
            {id:1, type:'system', title:'系统升级通知', desc:'系统将于今晚 23:00-01:00 进行升级维护', time:'10 分钟前', unread:true, icon:'⚙️'},
            {id:2, type:'order', title:'会员购买成功', desc:'您已成功购买季卡会员，有效期至 2026-08-17', time:'1 小时前', unread:true, icon:'💳'},
            {id:3, type:'activity', title:'活动即将结束', desc:'新人专享活动还剩 3 天结束，快去参与吧', time:'2 小时前', unread:false, icon:'🎁'},
            {id:4, type:'system', title:'功能更新', desc:'新增合同审阅功能，快去体验吧', time:'昨天', unread:false, icon:'✨'},
            {id:5, type:'order', title:'Token 充值成功', desc:'您已成功充值 100 Token', time:'2026-05-15', unread:false, icon:'💰'}
        ];
        
        function renderNotifications() {
            const list = document.getElementById('notificationList');
            const empty = document.getElementById('emptyState');
            
            let filtered = notifications;
            if (currentFilter !== 'all') {
                filtered = notifications.filter(n => n.type === currentFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            list.innerHTML = filtered.map(n => `
                <div class="notification-item ${n.unread ? 'unread' : ''}" onclick="markRead(${n.id})">
                    <div class="notification-icon">${n.icon}</div>
                    <div class="notification-content">
                        <div class="notification-title">${n.title}</div>
                        <div class="notification-desc">${n.desc}</div>
                        <div class="notification-time">${n.time}</div>
                    </div>
                    ${n.unread ? '<div class="notification-dot"></div>' : ''}
                </div>
            `).join('');
        }
        
        function filterType(type, tab) {
            currentFilter = type;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderNotifications();
        }
        
        function markRead(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) notif.unread = false;
            renderNotifications();
        }
        
        function clearAll() {
            if (confirm('确定清空全部消息吗？')) {
                notifications = [];
                renderNotifications();
            }
        }
        
        function toggleSetting(el) {
            el.classList.toggle('on');
            // TODO: 保存设置到服务器
        }
        
        renderNotifications();
    </script>
</body>
</html>
