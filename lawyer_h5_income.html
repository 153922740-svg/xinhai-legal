<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收益中心 - 心海法律AI</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #131825;
            --bg-tertiary: #1e2438;
            --bg-card: #1a1f2e;
            --border: #2a3148;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-hover: #818cf8;
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(99,102,241,0.15);
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .nav-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10,14,26,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-back { font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: var(--radius-sm); transition: all 0.2s; }
        .nav-back:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-title { font-size: 18px; font-weight: 600; flex: 1; }

        .sidebar {
            position: fixed; top: 57px; left: 0; bottom: 0;
            width: 220px; background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 16px 0; overflow-y: auto; z-index: 50;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; color: var(--text-secondary);
            font-size: 14px; transition: all 0.2s; cursor: pointer;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover { background: rgba(99,102,241,0.08); color: var(--text-primary); }
        .sidebar-item.active { color: var(--accent-primary); background: rgba(99,102,241,0.1); border-left-color: var(--accent-primary); }
        .sidebar-item .icon { width: 20px; text-align: center; font-size: 16px; }
        .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }
        .sidebar-label { padding: 12px 20px 4px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .main-content {
            margin-left: 220px; margin-top: 57px; padding: 24px;
            min-height: calc(100vh - 57px);
        }

        /* ==================== 资产概览 ==================== */
        .asset-banner {
            background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            margin-bottom: 24px;
            position: relative; overflow: hidden;
        }
        .asset-banner::before {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            border-radius: 50%;
        }
        .asset-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; position: relative; }
        .asset-amount {
            font-size: 42px; font-weight: 700;
            background: linear-gradient(135deg, #e8eaed, var(--accent-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }
        .asset-sub {
            display: flex; gap: 32px; margin-top: 16px; position: relative;
        }
        .asset-sub-item { text-align: center; }
        .asset-sub-value { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .asset-sub-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* ==================== 金额卡片网格 ==================== */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 16px 18px;
            transition: all 0.3s;
        }
        .stat-card .stat-label { font-size: 12px; color: var(--text-muted); }
        .stat-card .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
        .stat-card .stat-value.green { color: var(--success); }
        .stat-card .stat-value.blue { color: var(--accent-primary); }
        .stat-card .stat-value.orange { color: var(--warning); }
        .stat-card .stat-value.gray { color: var(--text-secondary); }

        /* ==================== 操作按钮 ==================== */
        .action-row {
            display: flex; gap: 12px; margin-bottom: 24px;
        }
        .income-action-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px; border-radius: var(--radius-md);
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: all 0.3s; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary);
        }
        .income-action-btn:hover {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
            transform: translateY(-1px);
        }
        .income-action-btn.primary {
            background: var(--accent-primary); color: white; border-color: var(--accent-primary);
        }
        .income-action-btn.primary:hover { background: var(--accent-hover); }

        /* ==================== 交易记录 ==================== */
        .record-tabs {
            display: flex; gap: 4px; margin-bottom: 16px;
        }
        .record-tab {
            padding: 8px 18px; border-radius: var(--radius-sm);
            font-size: 13px; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent; background: none;
        }
        .record-tab:hover { color: var(--text-primary); }
        .record-tab.active { background: var(--bg-tertiary); border-color: var(--border); color: var(--text-primary); }

        .record-list { display: flex; flex-direction: column; }
        .record-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0; border-bottom: 1px solid rgba(42,49,72,0.4);
        }
        .record-item:last-child { border-bottom: none; }
        .record-icon {
            width: 40px; height: 40px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .record-icon.income { background: rgba(34,197,94,0.12); }
        .record-icon.withdraw { background: rgba(239,68,68,0.12); }
        .record-icon.fee { background: rgba(245,158,11,0.12); }
        .record-info { flex: 1; min-width: 0; }
        .record-title { font-size: 14px; font-weight: 500; }
        .record-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .record-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
        .record-amount.positive { color: var(--success); }
        .record-amount.negative { color: var(--error); }
        .record-status {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            margin-left: 8px;
        }
        .record-status.success { background: rgba(34,197,94,0.15); color: var(--success); }
        .record-status.pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .record-status.failed { background: rgba(239,68,68,0.15); color: var(--error); }

        .record-empty {
            text-align: center; padding: 48px 20px; color: var(--text-muted);
        }
        .record-empty .empty-icon { font-size: 40px; margin-bottom: 12px; }

        .loading-state {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .loading-state .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--accent-primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ==================== 提现弹窗 ==================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-panel {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-xl); width: 100%; max-width: 440px;
            padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .modal-body { }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .modal-field input, .modal-field select {
            width: 100%; padding: 10px 14px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-size: 14px; outline: none;
        }
        .modal-field input:focus, .modal-field select:focus { border-color: var(--accent-primary); }
        .modal-field .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button {
            flex: 1; padding: 10px; border-radius: var(--radius-sm);
            font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel { border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); }
        .btn-cancel:hover { color: var(--text-primary); }
        .btn-confirm { border: none; background: var(--accent-primary); color: white; }
        .btn-confirm:hover { background: var(--accent-hover); }
        .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 12px 24px;
            font-size: 14px; color: var(--text-primary);
            box-shadow: var(--shadow-card); z-index: 300;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .asset-banner { padding: 20px; }
            .asset-amount { font-size: 32px; }
            .asset-sub { gap: 20px; }
            .action-row { flex-direction: column; }
            .modal-panel { border-radius: var(--radius-lg); }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a class="nav-back" href="/lawyer/dashboard.html">←</a>
    <div class="nav-title">💰 收益中心</div>
</nav>

<aside class="sidebar">
    <div class="sidebar-label">律师工具</div>
    <a class="sidebar-item" href="/lawyer/dashboard.html"><span class="icon">📊</span> 工作台</a>
    <a class="sidebar-item" href="/lawyer/cases.html"><span class="icon">📋</span> 案件管理</a>
    <a class="sidebar-item" href="/lawyer/schedule.html"><span class="icon">📅</span> 日程管理</a>
    <a class="sidebar-item active" href="/lawyer/income.html"><span class="icon">💰</span> 收益中心</a>
    <a class="sidebar-item" href="/lawyer/clients.html"><span class="icon">👥</span> 客户管理</a>
    <a class="sidebar-item" href="/lawyer/ai-tools.html"><span class="icon">🤖</span> AI工具台</a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">系统</div>
    <a class="sidebar-item" href="/index.html"><span class="icon">🏠</span> 返回首页</a>
</aside>

<main class="main-content">
    <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <div>加载中...</div>
    </div>

    <div id="contentArea" style="display:none;">
        <!-- 资产横幅 -->
        <div class="asset-banner">
            <div class="asset-label">账户余额</div>
            <div class="asset-amount" id="balanceDisplay">¥0.00</div>
            <div class="asset-sub">
                <div class="asset-sub-item">
                    <div class="asset-sub-value" id="totalIncomeDisplay">¥0</div>
                    <div class="asset-sub-label">累计收入</div>
                </div>
                <div class="asset-sub-item">
                    <div class="asset-sub-value" id="totalWithdrawnDisplay">¥0</div>
                    <div class="asset-sub-label">已提现</div>
                </div>
                <div class="asset-sub-item">
                    <div class="asset-sub-value" id="frozenDisplay">¥0</div>
                    <div class="asset-sub-label">冻结中</div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">本月收入</div>
                <div class="stat-value blue" id="monthIncome">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">当月结算</div>
                <div class="stat-value green" id="monthSettled">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">待结算</div>
                <div class="stat-value orange" id="pendingSettlement">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">案件总数</div>
                <div class="stat-value gray" id="totalCases">-</div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-row">
            <button class="income-action-btn primary" onclick="openWithdraw()">💳 申请提现</button>
            <button class="income-action-btn" onclick="showToast('功能开发中')">📊 收益报表</button>
        </div>

        <!-- 交易记录 -->
        <div class="panel-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;">
            <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);">
                <span style="font-size:15px;font-weight:600;">📄 交易记录</span>
            </div>
            <div style="padding:12px 20px 0;">
                <div class="record-tabs">
                    <button class="record-tab active" data-type="all" onclick="switchTab(this)">全部</button>
                    <button class="record-tab" data-type="income" onclick="switchTab(this)">收入</button>
                    <button class="record-tab" data-type="withdraw" onclick="switchTab(this)">提现</button>
                </div>
            </div>
            <div style="padding:0 20px 12px;" id="recordList">
                <div class="record-empty"><div class="empty-icon">📄</div><div>暂无交易记录</div></div>
            </div>
        </div>
    </div>
</main>

<!-- 提现弹窗 -->
<div class="modal-overlay" id="withdrawModal">
    <div class="modal-panel">
        <div class="modal-title">💳 申请提现</div>
        <div class="modal-body">
            <div class="modal-field">
                <label>可提现余额</label>
                <div style="font-size:24px;font-weight:700;color:var(--accent-primary);" id="withdrawableAmount">¥0.00</div>
            </div>
            <div class="modal-field">
                <label>提现金额</label>
                <input type="number" id="withdrawAmount" placeholder="请输入提现金额" min="1">
                <div class="hint">最低提现 ¥1.00，提现到律所对公账户</div>
            </div>
            <div class="modal-field">
                <label>备注（选填）</label>
                <input type="text" id="withdrawRemark" placeholder="案件编号或其他备注">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeWithdraw()">取消</button>
                <button class="btn-confirm" id="withdrawBtn" onclick="submitWithdraw()">确认提现</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = window.location.origin + '/api';
const USER_KEY = 'xinclaw_lawyer_user';

function getUser() {
    try { return JSON.parse(localStorage.getItem(USER_KEY) || sessionStorage.getItem(USER_KEY) || '{}'); }
    catch(e) { return {}; }
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
function formatDate(iso) {
    if (!iso) return '-';
    try { const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    catch(e) { return iso; }
}
function fmt(n) { return '¥' + (n || 0).toFixed(2); }

let walletData = {};
let currentTab = 'all';

// ==================== 加载数据 ====================
async function loadIncome() {
    document.getElementById('loadingState').style.display = '';
    document.getElementById('contentArea').style.display = 'none';

    try {
        const user = getUser();
        const uid = user.user_id || 1;

        // 并行加载钱包+收入明细+提现记录
        const [walletRes, incomeRes, withdrawRes] = await Promise.all([
            fetch(`${API_BASE}/lawyer/wallet?user_id=${uid}`),
            fetch(`${API_BASE}/lawyer/wallet/income?user_id=${uid}`),
            fetch(`${API_BASE}/lawyer/wallet/withdrawals?user_id=${uid}`)
        ]);

        const wRes = await walletRes.json();
        const iRes = await incomeRes.json();
        const dRes = await withdrawRes.json();

        if (!wRes.success) throw new Error(wRes.error || '获取失败');

        walletData = wRes.data;

        // 资产横幅
        document.getElementById('balanceDisplay').textContent = fmt(walletData.balance);
        document.getElementById('totalIncomeDisplay').textContent = fmt(walletData.total_income);
        document.getElementById('totalWithdrawnDisplay').textContent = fmt(walletData.total_withdrawn);
        document.getElementById('frozenDisplay').textContent = fmt(walletData.frozen);

        // 统计卡片
        document.getElementById('monthIncome').textContent = fmt(walletData.total_income);
        document.getElementById('monthSettled').textContent = fmt((walletData.total_income || 0) - (walletData.frozen || 0) - (walletData.pending || 0));
        document.getElementById('pendingSettlement').textContent = fmt(walletData.pending);
        document.getElementById('totalCases').textContent = '-';

        // 合并记录
        const allRecords = [
            ...(iRes.data?.records || []).map(r => ({...r, _type: 'income'})),
            ...(dRes.data?.records || []).map(r => ({...r, _type: 'withdraw'}))
        ];
        allRecords.sort((a, b) => (b.created_at || b.time || '') > (a.created_at || a.time || '') ? 1 : -1);

        renderRecords(allRecords);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('contentArea').style.display = '';

    } catch (e) {
        document.getElementById('loadingState').innerHTML = `<div class="loading-state"><div style="color:var(--error);font-size:16px;">⚠️ ${e.message}</div><button class="income-action-btn" onclick="loadIncome()" style="margin-top:12px;display:inline-flex;padding:8px 20px;">重试</button></div>`;
    }
}

// ==================== 渲染记录 ====================
function renderRecords(records) {
    const el = document.getElementById('recordList');

    const filtered = currentTab === 'all' ? records : records.filter(r => r._type === currentTab);

    if (!filtered || filtered.length === 0) {
        el.innerHTML = '<div class="record-empty"><div class="empty-icon">📄</div><div>暂无交易记录</div></div>';
        return;
    }

    el.innerHTML = filtered.map(r => {
        const isIncome = r._type === 'income';
        const amount = r.amount || r.commission || 0;
        const time = formatDate(r.created_at || r.time);
        const status = r.status || 'completed';
        const statusLabel = status === 'completed' ? '已完成' : status === 'pending' ? '处理中' : '失败';
        const statusClass = status === 'completed' ? 'success' : status === 'pending' ? 'pending' : 'failed';

        return `<div class="record-item">
            <div class="record-icon ${isIncome ? 'income' : 'withdraw'}">${isIncome ? '📩' : '💳'}</div>
            <div class="record-info">
                <div class="record-title">${r.title || r.remark || (isIncome ? '案件收入' : '提现')}</div>
                <div class="record-meta">${time}</div>
            </div>
            <div>
                <div class="record-amount ${isIncome ? 'positive' : 'negative'}">${isIncome ? '+' : '-'}${fmt(amount)}</div>
                <span class="record-status ${statusClass}">${statusLabel}</span>
            </div>
        </div>`;
    }).join('');
}

// ==================== 切换Tab ====================
function switchTab(el) {
    document.querySelectorAll('.record-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.type;
    // 重新加载
    loadIncome();
}

// ==================== 提现 ====================
function openWithdraw() {
    const bal = walletData.balance || 0;
    if (bal <= 0) {
        showToast('余额不足，无法提现');
        return;
    }
    document.getElementById('withdrawableAmount').textContent = fmt(bal);
    document.getElementById('withdrawAmount').value = '';
    document.getElementById('withdrawModal').classList.add('show');
}

function closeWithdraw() {
    document.getElementById('withdrawModal').classList.remove('show');
}

async function submitWithdraw() {
    const btn = document.getElementById('withdrawBtn');
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    const remark = document.getElementById('withdrawRemark').value;

    if (!amount || amount <= 0) { showToast('请输入有效金额'); return; }
    if (amount > (walletData.balance || 0)) { showToast('余额不足'); return; }

    btn.disabled = true;
    btn.textContent = '提交中...';

    try {
        const user = getUser();
        const uid = user.user_id || 1;
        const res = await fetch(`${API_BASE}/lawyer/wallet/withdraw`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_id: uid, amount: amount, remark: remark })
        });
        const result = await res.json();

        if (result.success) {
            showToast('✅ 提现申请已提交');
            closeWithdraw();
            loadIncome();
        } else {
            showToast('❌ ' + (result.error || '提交失败'));
        }
    } catch (e) {
        showToast('❌ 网络错误');
    } finally {
        btn.disabled = false;
        btn.textContent = '确认提现';
    }
}

// 点击模态框外部关闭
document.getElementById('withdrawModal').addEventListener('click', function(e) {
    if (e.target === this) closeWithdraw();
});

// ==================== 初始化 ====================
loadIncome();
</script>
</body>
</html>
