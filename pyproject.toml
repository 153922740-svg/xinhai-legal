[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::pytest.PytestConfigWarning",
]

[tool.coverage.run]
source = ["app", "services", "models"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if __name__ == '__main__':",
    "raise HTTPException",
    "raise NotImplementedError",
    "def __repr__",
    "def __str__",
]
